<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100%;
  height:100%;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#0b0b0b;
  color:#ffffff;
  display:flex;
  align-items:center;

.container{

h1{

.btn{

  background:#0088cc;
  color:#ffffff;
  padding:18px 20px;
  font-size:19px;
  font-weight:bold;
  border-radius:14px;
  text-decoration:none;
  margin-top:28px;
  border:none;
  cursor:pointer;
  font-family:inherit;
  animation:bluePulse 2s infinite;
  transition:transform .2s ease;
}

.btn:active{
  transform:scale(0.97);
}

@keyframes bluePulse{
  0%{
    box-shadow:0 0 0 0 rgba(0,136,204,0.7);
  }
  70%{
    box-shadow:0 0 0 18px rgba(0,136,204,0);
